name: 🚀 Android CI — Build & Release APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Debug APK & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔧 Ensure gradle-wrapper.jar exists
        run: |
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$WRAPPER_JAR" ]; then
            echo "gradle-wrapper.jar not found. Downloading..."
            mkdir -p gradle/wrapper
            curl -fsSL \
              "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$WRAPPER_JAR"
          fi

      - name: 📦 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔧 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🔨 Build debug APK
        id: build_apk
        run: |
          echo "Starting build..."
          ./gradlew assembleDebug --no-daemon --stacktrace > build_output.log 2>&1 || (cat build_output.log && exit 1)

      - name: 🚨 Print failure details to Step Summary
        if: failure()
        run: |
          echo "### ❌ Build Failed — Error Log Summary" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          grep -E "e: |FAILURE:|What went wrong:|A problem occurred|Exception|error:|Error:" build_output.log -C 3 | tail -n 80 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload Build Log Artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: build_output.log
          retention-days: 7

      - name: 📊 Report APK info
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
          echo "✅ APK built successfully!"
          echo "   Path : $APK_PATH"
          echo "   Size : $APK_SIZE"

      - name: 🏷️ Publish APK to GitHub Release (latest-build)
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          BUILD_DATE=$(date '+%Y-%m-%d %H:%M JST' --date='9 hours')
          BRANCH="${{ github.ref_name }}"

          gh release delete latest-build --yes 2>/dev/null || true
          git push origin --delete latest-build 2>/dev/null || true

          gh release create latest-build \
            --title "📱 ClipScout — 最新ビルド (${BUILD_DATE})" \
            --notes "## 📲 インストール方法

          **このページの \`app-debug.apk\` をスマートフォンでタップしてインストール**" \
            --prerelease \
            "app/build/outputs/apk/debug/app-debug.apk"
